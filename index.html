<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Çok Yakında</title>

<style>
body{
margin:0;
padding:0;
font-family:Arial, sans-serif;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
text-align:center;
}

.container{
max-width:600px;
}

h1{
font-size:60px;
margin-bottom:10px;
}

p{
font-size:20px;
opacity:0.8;
}

.countdown{
display:flex;
justify-content:center;
gap:20px;
margin-top:40px;
}

.box{
background:rgba(255,255,255,0.1);
padding:20px;
border-radius:10px;
}

.box span{
font-size:35px;
display:block;
}

.social{
margin-top:40px;
}

.social a{
color:white;
margin:0 10px;
font-size:20px;
text-decoration:none;
}
</style>
</head>

<body>

<div class="container">

<h1>Çok Yakında</h1>

<p>Yeni web sitemiz üzerinde çalışıyoruz. Çok yakında yayındayız.</p>

<div class="countdown">
<div class="box"><span id="days">0</span>Gün</div>
<div class="box"><span id="hours">0</span>Saat</div>
<div class="box"><span id="minutes">0</span>Dakika</div>
<div class="box"><span id="seconds">0</span>Saniye</div>
</div>

<div class="social">
<a href="#">Instagram</a>
<a href="#">Twitter</a>
<a href="#">Discord</a>
</div>

</div>

<script>

var countDate = new Date("Apr 30, 2026 00:00:00").getTime();

var x = setInterval(function(){

var now = new Date().getTime();
var distance = countDate - now;

var days = Math.floor(distance / (1000*60*60*24));
var hours = Math.floor((distance % (1000*60*60*24)) / (1000*60*60));
var minutes = Math.floor((distance % (1000*60*60)) / (1000*60));
var seconds = Math.floor((distance % (1000*60)) / 1000);

document.getElementById("days").innerHTML = days;
document.getElementById("hours").innerHTML = hours;
document.getElementById("minutes").innerHTML = minutes;
document.getElementById("seconds").innerHTML = seconds;

},1000);

</script>

</body>
</html>
